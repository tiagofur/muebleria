services:
  db:
    image: postgres:15-alpine
    container_name: muebles-postgres
    # Auto-arranque cuando Docker Desktop arranca (p.ej. tras reiniciar la
    # máquina). unless-stopped respeta un `docker compose down` explícito:
    # solo se reabre si el último estado no fue "stopped" por el usuario.
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: muebles
    ports:
      - '5445:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend-go/db/migration/000001_init_schema.up.sql:/docker-entrypoint-initdb.d/init.sql

volumes:
  postgres_data:
