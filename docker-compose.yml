version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: muebles-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: muebles
    ports:
      - '5445:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend-go/db/migration/000001_init_schema.up.sql:/docker-entrypoint-initdb.d/init.sql

volumes:
  postgres_data:
